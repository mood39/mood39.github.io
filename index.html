<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>三才聚頂 五式朝元</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#141820">
<link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="五式朝元">
<style>
:root{
  --ink:#141820; --ink2:#1c222e; --panel:#20283a; --line:#39435c;
  --gold:#d9b36a; --gold-dim:#9a8352; --paper:#e8e2d4; --dim:#8f95a3; --seal:#a33c34;
  --bar:52px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{background:var(--ink)}
body{
  font-family:"Noto Serif TC","Songti TC","PMingLiU",serif;
  color:var(--paper);background:var(--ink);
  min-height:100dvh;line-height:1.65;
  -webkit-tap-highlight-color:transparent;
}

/* ── 總覽 ── */
#home{padding:calc(env(safe-area-inset-top) + 26px) clamp(14px,3vw,34px) 60px;max-width:1180px;margin:0 auto}
header{border-bottom:1px solid var(--line);padding-bottom:16px;margin-bottom:22px}
header h1{font-size:clamp(21px,3.2vw,30px);font-weight:700;letter-spacing:.34em;color:var(--gold)}
header .sub{display:block;letter-spacing:.16em;font-size:.46em;color:var(--dim);margin-top:7px;font-weight:400}
header p{margin-top:9px;color:var(--dim);font-size:13.5px}

.lead{font-size:11px;letter-spacing:.25em;color:var(--gold-dim);border-left:2px solid var(--gold-dim);padding-left:8px;margin:0 0 10px}
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(232px,1fr));gap:14px;margin-bottom:26px}
.tile{
  display:flex;align-items:center;gap:13px;text-align:left;width:100%;
  background:var(--ink2);border:1px solid var(--line);border-radius:8px;
  padding:15px 16px;cursor:pointer;color:inherit;font-family:inherit;
  transition:border-color .2s, transform .12s;
}
.tile:hover{border-color:var(--gold-dim)}
.tile:active{transform:scale(.985)}
.tile:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
.tile .seal{
  width:38px;height:38px;border-radius:50%;flex:none;
  border:1.5px solid var(--seal);color:var(--seal);
  display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;
}
.tile .nm{font-size:16.5px;letter-spacing:.16em;font-weight:700;display:block}
.tile .rl{font-size:11.5px;color:var(--dim);letter-spacing:.03em}
.tile.wide{grid-column:1/-1;background:linear-gradient(180deg,#232c42,var(--ink2));border-color:var(--gold-dim)}
.tile.wide .seal{border-color:var(--gold);color:var(--gold);width:42px;height:42px;font-size:15px;letter-spacing:-.05em}
.tile.wide .nm{color:var(--gold)}

footer{border-top:1px solid var(--line);padding-top:12px;color:var(--dim);font-size:12px}

/* ── 檢視（全幅 iframe ＋ 細返回列）── */
#viewer{display:none;position:fixed;inset:0;background:var(--ink);flex-direction:column;z-index:50}
#viewer.on{display:flex}
#bar{
  height:calc(var(--bar) + env(safe-area-inset-top));
  padding-top:env(safe-area-inset-top);
  display:flex;align-items:center;gap:12px;padding-left:8px;padding-right:14px;
  background:var(--ink2);border-bottom:1px solid var(--line);flex:none;
}
#back{
  background:none;border:0;color:var(--gold);font-family:inherit;
  font-size:15px;letter-spacing:.12em;padding:8px 12px;cursor:pointer;border-radius:6px;
}
#back:hover{background:var(--panel)}
#back:focus-visible{outline:2px solid var(--gold);outline-offset:-2px}
#vSeal{
  width:26px;height:26px;border-radius:50%;flex:none;border:1px solid var(--seal);color:var(--seal);
  display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;
}
#vName{font-size:15px;letter-spacing:.16em;font-weight:700}
#vRole{font-size:11px;color:var(--dim);margin-left:auto;text-align:right}
#frames{flex:1;position:relative;background:var(--ink)}
#frames iframe{position:absolute;inset:0;width:100%;height:100%;border:0;background:#fff;display:none}
#frames iframe.on{display:block}
#spin{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  color:var(--dim);font-size:13px;letter-spacing:.2em;pointer-events:none;
}
@media (max-width:640px){ #vRole{display:none} }
</style>
</head>
<body>

<main id="home">
  <header>
    <h1>三才聚頂　五式朝元<span class="sub">太乙神數 · 紫微斗數 · 大六壬 · 奇門遁甲 · 納甲六爻</span></h1>
    <p>五式各自獨立成盤，亦可一併聚合參看。此處所開，即各引擎原檔，計算未經改動。</p>
  </header>

  <div class="lead">聚合</div>
  <div id="grid">
    <button class="tile wide" data-k="juhe">
      <span class="seal">五式</span>
      <span><span class="nm">三才聚頂 · 五式朝元</span><span class="rl">一輸入五盤 · 白話卡牌 · 分歧保留、不強行合一</span></span>
    </button>
  </div>

  <div class="lead">獨立起盤</div>
  <div id="grid2" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(232px,1fr));gap:14px;margin-bottom:26px"></div>

  <footer>各盤由引擎本人繪製，返回總覽不重算；離線亦可起盤。</footer>
</main>

<section id="viewer" aria-hidden="true">
  <div id="bar">
    <button id="back">‹　總覽</button>
    <div id="vSeal"></div>
    <div id="vName"></div>
    <div id="vRole"></div>
  </div>
  <div id="frames"><div id="spin">載入中…</div></div>
</section>

<script>
"use strict";
/* 三才聚頂 五式朝元 · 總入口
   1. 引擎零改動：以 iframe 全幅開啟原檔，外層僅加一條返回列。
   2. iframe 首開後常駐：返回總覽為隱藏而非卸載——再次點入，盤仍在原處。
   3. hash 路由：iOS 側滑返回、系統返回鍵皆可用。 */
const ENGINES = [
  {k:"juhe",   path:"/arithmetic/",    seal:"五式", name:"五式朝元 · 聚合", role:"一輸入五盤 · 白話卡牌"},
  {k:"taiyi",  path:"/Taiyishenshu/",  seal:"天",   name:"太乙神數", role:"大勢 · 天時 · 值運"},
  {k:"ziwei",  path:"/ziwei/",         seal:"命",   name:"紫微斗數", role:"先天結構 · 大限流年"},
  {k:"liuren", path:"/daliuren/",      seal:"人",   name:"大六壬",   role:"人事 · 事應 · 年命"},
  {k:"qimen",  path:"/qimen/",         seal:"地",   name:"奇門遁甲", role:"方位 · 擇時 · 行動"},
  {k:"liuyao", path:"/liuyao/",        seal:"決",   name:"納甲六爻", role:"占斷 · 取捨"},
  {k:"taixuan", path:"/taixuan/", seal:"玄", name:"太玄", role:"揲筮 · 配曆"},
];
const $ = id => document.getElementById(id);
const FR = {};

/* 獨立起盤五磚 */
const g2 = $("grid2");
ENGINES.filter(e=>e.k!=="juhe").forEach(e=>{
  const b = document.createElement("button");
  b.className = "tile"; b.dataset.k = e.k;
  b.innerHTML = `<span class="seal">${e.seal}</span>
    <span><span class="nm">${e.name}</span><span class="rl">${e.role}</span></span>`;
  g2.appendChild(b);
});

document.addEventListener("click", ev=>{
  const t = ev.target.closest("[data-k]");
  if(t) location.hash = "#/" + t.dataset.k;
});
$("back").onclick = ()=>{
  if(history.length > 1) history.back();     /* 保留系統返回堆疊 */
  else location.hash = "";
};

function open(k){
  const eng = ENGINES.find(e=>e.k===k);
  if(!eng) return close();
  $("vSeal").textContent = eng.seal;
  $("vName").textContent = eng.name;
  $("vRole").textContent = eng.role;
  Object.values(FR).forEach(f=>f.classList.remove("on"));
  if(!FR[k]){                                 /* 首開才建，其後常駐 */
    const f = document.createElement("iframe");
    f.src = eng.path; f.title = eng.name; f.loading = "eager";
    $("frames").appendChild(f);
    FR[k] = f;
    $("spin").style.display = "flex";
    f.addEventListener("load", ()=>{ $("spin").style.display = "none"; }, {once:true});
  }else{
    $("spin").style.display = "none";
  }
  FR[k].classList.add("on");
  $("viewer").classList.add("on");
  $("viewer").setAttribute("aria-hidden","false");
  $("home").style.display = "none";
  document.title = eng.name + " · 五式朝元";
}
function close(){
  $("viewer").classList.remove("on");
  $("viewer").setAttribute("aria-hidden","true");
  $("home").style.display = "";
  document.title = "三才聚頂 五式朝元";
}
function route(){
  const m = location.hash.match(/^#\/(\w+)$/);
  m ? open(m[1]) : close();
}
addEventListener("hashchange", route);
route();

if("serviceWorker" in navigator) navigator.serviceWorker.register("/sw.js").catch(()=>{});
</script>
</body>
</html>
